services:
  postgres:
    image: postgres:17-alpine
    container_name: jobsearchtracker-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpass
      POSTGRES_DB: jobsearchtracker
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

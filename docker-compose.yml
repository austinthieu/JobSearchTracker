services:
  postgres:
    image: postgres:17-alpine
    container_name: jobsearchtracker-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpass
      POSTGRES_DB: jobsearchtracker
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    image: jobsearchtracker-api
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=jobsearchtracker;Username=jobuser;Password=jobpass"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "JobSearchTracker"
      Jwt__Audience: "JobSearchTracker"

volumes:
  pgdata:

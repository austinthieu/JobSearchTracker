services:
  postgres:
    image: postgres:17-alpine
    container_name: jobsearchtracker-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpass
      POSTGRES_DB: jobsearchtracker
    volumes:
      - pgdata:/var/lib/postgresql/data
  minio:
    image: minio/minio
    container_name: jobsearchtracker-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
  api:
    image: jobsearchtracker-api
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=jobsearchtracker;Username=jobuser;Password=jobpass"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "JobSearchTracker"
      Jwt__Audience: "JobSearchTracker"
      S3__BucketName: "uploads"
      S3__Endpoint: "http://minio:9000"
      S3__UseSsl: "false"
    depends_on:
      - postgres
      - minio

volumes:
  pgdata:
